<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F2LYG – Poker, Upgraded</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2B2B2B;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      color: #3EB489;
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    p {
      max-width: 600px;
      font-size: 1.2rem;
      color: #e0e0e0;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 2rem;
    }

    .coming-soon {
      font-size: 1.1rem;
      margin-top: 2rem;
      background-color: #3F3F3F;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      display: inline-block;
      color: #3EB489;
      font-weight: bold;
    }

    .email-box {
      margin-top: 2rem;
    }

    input[type="email"] {
      padding: 0.6rem 1rem;
      border-radius: 5px;
      border: none;
      margin-right: 0.5rem;
      width: 250px;
    }

    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 5px;
      background-color: #3EB489;
      color: #2B2B2B;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #34a57c;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="F2LYG Logo" class="logo" />

  <h1>Poker. Upgraded.</h1>
  <p>We’re reinventing online poker to make it smarter, sharper, and way more fun. A bold, rebellious platform is coming your way — are you ready to play?</p>
  
  <div class="coming-soon">Coming Soon</div>

  <div class="email-box">
    <form>
      <input type="email" placeholder="Enter your email" required />
      <button type="submit" class="email-box">Notify Me</button>
    </form>
  </div>

  <footer>
    © 2025 F2LYG. All rights reserved.
  </footer>
</body>
</html>
